# Apply Prisma migrations to Neon after every push to main.
# Add repo secret: DATABASE_URL = Neon connection string (?sslmode=require).
# Pooler URLs (-pooler) are OK — migrate script uses direct host automatically.

name: Neon migrate

on:
  push:
    branches: [main]

concurrency:
  group: neon-migrate-main
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w @frs/db

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/migrate-deploy.mjs
