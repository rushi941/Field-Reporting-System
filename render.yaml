# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint → connect this repo, or create services manually using the values below.

databases:
  - name: frs-postgres
    plan: free
    databaseName: frs
    user: frs

services:
  - type: web
    name: Field-Reporting-System
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        # Paste Neon DIRECT connection string (not -pooler), with ?sslmode=require
        # Or link Render Postgres: fromDatabase name frs-postgres property connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: https://field-reporting-system.onrender.com
      - key: STORAGE_DRIVER
        value: local
